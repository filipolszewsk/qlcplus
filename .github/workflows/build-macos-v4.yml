name: Build macOS DMG (QLC+ 4.14)

on:
  push:
    branches: [ main, master, fix/vcslider-properties-perf ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-v4:
    # macos-13 (Intel) daje binarkę kompatybilną od macOS 10.13 wzwyż (przez Rosetta na ARM).
    # ARM runnery (macos-14+) kompilują z nowym libc++ który referuje __libcpp_verbose_abort
    # — ten symbol nie istnieje na macOS < 13.3, więc aplikacja nie startuje.
    runs-on: macos-13
    name: Build QLC+ 4.14 macOS DMG

    env:
      CI_REPO_SLUG: ${{ github.repository }}
      CI_BRANCH: ${{ github.head_ref }}
      CI_PULL_REQUEST: ${{ github.event.number }}
      # Qt 5.15.2 LTS — zbudowane na Xcode 12, nie ma problemu z verbose_abort.
      # To jest Qt którego używa oficjalny QLC+ workflow dla macOS.
      QT_VERSION: "5.15.2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set ENV variables
        shell: bash
        run: |
          echo "CI_BRANCH=$(echo $GITHUB_REF | cut -d '/' -f 3)" >> $GITHUB_ENV
          echo "APPVERSION=$(grep '^!qmlui' variables.pri | grep APPVERSION | sed 's/^.*= *//;s/ /_/g')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
          echo "GIT_REV=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "QTDIR=${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/clang_64" >> $GITHUB_ENV
          echo "NPROC=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install fftw mad libsndfile libftdi libltc
          brew link --overwrite python@3.13 || true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          dir: "${{ github.workspace }}/qt/"
          # qtscript jest wymagany dla Qt 5 (JS engine). W Qt 6 zastąpiony przez qml.
          modules: 'qtscript'

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-build-macos-v4

      - name: Print ENV vars
        shell: bash
        run: |
          echo "CI_BRANCH: ${CI_BRANCH}"
          echo "APPVERSION: ${APPVERSION}"
          echo "BUILD_DATE: ${BUILD_DATE}"
          echo "GIT_REV: ${GIT_REV}"
          echo "QTDIR: ${QTDIR}"
          echo "NPROC: ${NPROC}"

      - name: Configure build
        shell: bash
        run: |
          # CMAKE_OSX_DEPLOYMENT_TARGET=10.13 (High Sierra 2017) — identycznie jak upstream.
          # Gwarantuje kompatybilność binarki z macOS 10.13+ (wszystkie nowsze Maki).
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ env.QTDIR }}/lib/cmake" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        shell: bash
        run: |
          cd build
          make -j${{ env.NPROC }}

      - name: Install
        shell: bash
        run: |
          cd build
          make install/fast

      - name: Fix dylib dependencies
        shell: bash
        run: |
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/Frameworks/libsndfile.1.dylib || true
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus-fixtureeditor || true
          ${{ env.QTDIR }}/bin/macdeployqt ~/QLC+.app

      - name: Ad-hoc code sign
        shell: bash
        run: |
          # Bez Apple Developer ID używamy ad-hoc signing ("-").
          # Entitlements są wymagane przez macOS 14+ do załadowania frameworków Qt z JIT.
          # --deep podpisuje wszystkie zagnieżdżone dyliby i frameworki.
          codesign --force --deep --sign - \
            --entitlements platforms/macos/qlcplus.entitlements \
            ~/QLC+.app

      - name: Prepare DMG staging folder
        shell: bash
        run: |
          # Tworzymy staging folder żeby wrzucić do DMG zarówno QLC+.app jak i Install.command.
          # Install.command pozwala użytkownikowi zainstalować przez Terminal (cp bez quarantine)
          # zamiast drag-and-drop, który propaguje atrybut quarantine i powoduje błąd "uszkodzona".
          mkdir -p /tmp/qlc-dmg-staging
          cp -Rf ~/QLC+.app /tmp/qlc-dmg-staging/
          cp platforms/macos/dmg/Install.command /tmp/qlc-dmg-staging/
          chmod +x /tmp/qlc-dmg-staging/Install.command

      - name: Create DMG
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 12
          retry_wait_seconds: 1
          command: |
            OUTDIR=$PWD
            cd platforms/macos/dmg
            ./create-dmg --volname "Q Light Controller Plus ${{ env.APPVERSION }}" \
              --volicon $OUTDIR/resources/icons/qlcplus.icns \
              --background background.png \
              --window-size 600 320 \
              --window-pos 200 100 \
              --icon-size 80 \
              --icon "QLC+.app" 120 160 \
              --icon "Install.command" 380 160 \
              --app-drop-link 560 160 \
              $OUTDIR/QLC+_${{ env.APPVERSION }}-${{ env.BUILD_DATE }}-${{ env.GIT_REV }}.dmg \
              /tmp/qlc-dmg-staging/

      - name: Store DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLC+-${{ env.APPVERSION }}-${{ env.BUILD_DATE }}-${{ env.GIT_REV }}.dmg
          path: QLC+_${{ env.APPVERSION }}-${{ env.BUILD_DATE }}-${{ env.GIT_REV }}.dmg
          retention-days: 30
