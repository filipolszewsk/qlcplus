name: Build macOS DMG (QLC+ 4.14)

on:
  push:
    branches: [ main, master, fix/vcslider-properties-perf ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-v4:
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: macos-13 (Intel) + oficjalne Qt 5.15.2 via aqtinstall.
          - arch: x86_64
            runner: macos-13
          # arm64: macos-14 (Apple Silicon) + Homebrew qt@5 + qtscript ze zrodel
          # (oficjalny Qt 5.15.2 nie ma buildu arm64 w aqtinstall).
          - arch: arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}
    name: Build QLC+ 4.14 macOS DMG (${{ matrix.arch }})

    env:
      CI_REPO_SLUG: ${{ github.repository }}
      CI_BRANCH: ${{ github.head_ref }}
      CI_PULL_REQUEST: ${{ github.event.number }}
      QT_VERSION: "5.15.2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set ENV variables
        shell: bash
        run: |
          echo "CI_BRANCH=$(echo $GITHUB_REF | cut -d '/' -f 3)" >> $GITHUB_ENV
          echo "APPVERSION=$(grep '^!qmlui' variables.pri | grep APPVERSION | sed 's/^.*= *//;s/ /_/g')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
          echo "GIT_REV=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "NPROC=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install fftw mad libsndfile libftdi libltc
          brew link --overwrite python@3.13 || true

      # ----------------------------------------------------------------
      # Qt installation — rozne scieszki dla x86_64 vs arm64
      # ----------------------------------------------------------------

      - name: Install Qt 5.15.2 (x86_64 via aqtinstall)
        if: matrix.arch == 'x86_64'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          dir: "${{ github.workspace }}/qt/"
          modules: 'qtscript'

      - name: Set QTDIR (x86_64)
        if: matrix.arch == 'x86_64'
        shell: bash
        run: |
          echo "QTDIR=${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/clang_64" >> $GITHUB_ENV

      - name: Install Qt 5 (arm64 via Homebrew qt@5)
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          brew install qt@5
          QT5_PREFIX=$(brew --prefix qt@5)
          echo "QTDIR=${QT5_PREFIX}" >> $GITHUB_ENV
          echo "${QT5_PREFIX}/bin" >> $GITHUB_PATH

      - name: Build qtscript from source (arm64)
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          # Homebrew qt@5 nie zawiera qtscript (modul deprecated w Qt 5.6+).
          # QLC+ uzywa QScriptEngine dla RGB Scripts (engine/src/rgbscript.cpp).
          #
          # Problem z `make install`: qmake uzywa `sed > plik` dla .prl, co jest
          # shell redirectem — nie moze byc podniesione przez sudo ani nie ma uprawnien
          # do /opt/homebrew/Cellar (Homebrew Cellar jest write-protected).
          #
          # Rozwiazanie: staged install do /tmp (brak problemow z uprawnieniami),
          # potem sudo cp wybranych plikow do wlasciwego prefixa Homebrew.
          QT5_PREFIX=$(brew --prefix qt@5)
          # Resolve symlink opt/homebrew/opt/qt@5 -> Cellar/qt@5/X.Y.Z
          QT5_REAL=$(cd "${QT5_PREFIX}" && pwd -P)
          STAGE=/tmp/qtscript-stage

          git clone --branch 5.15 --depth 1 https://code.qt.io/qt/qtscript.git /tmp/qtscript
          cd /tmp/qtscript
          "${QT5_PREFIX}/bin/qmake" QMAKE_APPLE_DEVICE_ARCHS=arm64
          make -j$(sysctl -n hw.ncpu)

          # Staged install: INSTALL_ROOT prependuje sciezke, nie wymaga uprawnien
          make install INSTALL_ROOT="${STAGE}"

          # Sciezka staged odpowiada: STAGE + QT5_REAL (bez poczatkowego /)
          QT5_STAGED="${STAGE}${QT5_REAL}"

          # Kopiuj framework (biblioteka + headery)
          sudo cp -Rf "${QT5_STAGED}/lib/QtScript.framework" "${QT5_REAL}/lib/"

          # Kopiuj cmake config zeby find_package(Qt5 COMPONENTS Script) zadzialal
          if [ -d "${QT5_STAGED}/lib/cmake/Qt5Script" ]; then
            sudo cp -Rf "${QT5_STAGED}/lib/cmake/Qt5Script" "${QT5_REAL}/lib/cmake/"
          fi

          # Kopiuj modul qmake (opcjonalny, dla poprawnosci srodowiska Qt)
          for f in qt_lib_script.pri qt_lib_script_private.pri; do
            if [ -f "${QT5_STAGED}/mkspecs/modules/${f}" ]; then
              sudo cp "${QT5_STAGED}/mkspecs/modules/${f}" "${QT5_REAL}/mkspecs/modules/"
            fi
          done

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-build-macos-v4-${{ matrix.arch }}

      - name: Print ENV vars
        shell: bash
        run: |
          echo "ARCH: ${{ matrix.arch }}"
          echo "RUNNER: ${{ matrix.runner }}"
          echo "CI_BRANCH: ${CI_BRANCH}"
          echo "APPVERSION: ${APPVERSION}"
          echo "BUILD_DATE: ${BUILD_DATE}"
          echo "GIT_REV: ${GIT_REV}"
          echo "QTDIR: ${QTDIR}"
          echo "NPROC: ${NPROC}"

      - name: Configure build
        shell: bash
        run: |
          # CMAKE_OSX_DEPLOYMENT_TARGET=12.0 — matching oficjalnej dystrybucji
          # qlcplus.org ("macOS 12 or later"). arm64 musi byc min 11.0, 12.0 to OK.
          # CMAKE_OSX_ARCHITECTURES wymusza pojedyncza architekture niezaleznie od
          # tego co wykryje CMake z runnera (na wypadek gdyby ccache cos mylilo).
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QTDIR}/lib/cmake" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        shell: bash
        run: |
          cd build
          make -j${NPROC}

      - name: Install
        shell: bash
        run: |
          cd build
          make install/fast

      - name: Fix dylib dependencies
        shell: bash
        run: |
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/Frameworks/libsndfile.1.dylib || true
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus-fixtureeditor || true
          "${QTDIR}/bin/macdeployqt" ~/QLC+.app

      # UWAGA: Swiadomie nie robimy ad-hoc codesign + hardened runtime entitlements.
      # Na macOS 12 (szczegolnie M1) taka kombinacja jest flaky i powoduje crash
      # przy starcie. Oficjalny upstream QLC+ (.github/workflows/build.yml) tez
      # nie podpisuje. User pierwszy raz uruchamiajac apke musi zrobic prawy-klik
      # -> Otworz (bypass Gatekeeper) LUB: xattr -dr com.apple.quarantine /Applications/QLC+.app

      - name: Create DMG
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 12
          retry_wait_seconds: 1
          command: |
            OUTDIR=$PWD
            cd platforms/macos/dmg
            ./create-dmg --volname "Q Light Controller Plus ${APPVERSION}" \
              --volicon $OUTDIR/resources/icons/qlcplus.icns \
              --background background.png \
              --window-size 400 300 \
              --window-pos 200 100 \
              --icon-size 64 \
              --icon "QLC+" 0 150 \
              --app-drop-link 200 150 \
              "$OUTDIR/QLC+_${APPVERSION}_${{ matrix.arch }}.dmg" \
              ~/QLC+.app

      - name: Store DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLC+_${{ env.APPVERSION }}_${{ matrix.arch }}.dmg
          path: QLC+_${{ env.APPVERSION }}_${{ matrix.arch }}.dmg
          retention-days: 30
