name: Build macOS DMG (QLC+ 4.14)

on:
  push:
    branches: [ main, master, fix/vcslider-properties-perf ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-v4:
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: macos-13 (Intel hardware, native x86_64 build)
          - arch: x86_64
            runner: macos-13
          # arm64: macos-14 (Apple Silicon hardware, native arm64 build)
          - arch: arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}
    name: Build QLC+ 4.14 macOS DMG (${{ matrix.arch }})

    env:
      CI_REPO_SLUG: ${{ github.repository }}
      CI_BRANCH: ${{ github.head_ref }}
      CI_PULL_REQUEST: ${{ github.event.number }}
      QT_VERSION: "6.8.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set ENV variables
        shell: bash
        run: |
          echo "CI_BRANCH=$(echo $GITHUB_REF | cut -d '/' -f 3)" >> $GITHUB_ENV
          echo "APPVERSION=$(grep '^!qmlui' variables.pri | grep APPVERSION | sed 's/^.*= *//;s/ /_/g')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
          echo "GIT_REV=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "NPROC=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install fftw mad libsndfile libftdi libltc
          brew link --overwrite python@3.13 || true

      # ----------------------------------------------------------------
      # Qt 6.8.1 via aqtinstall — oficjalne uniwersalne buildy (x86_64 + arm64
      # w jednym frameworku). Dziala identycznie na macos-13 i macos-14.
      # Moduly dobrane zeby pokryc caly projekt QLC+ 4.14:
      #   qtmultimedia         — QAudioSource/QVideoWidget (LTC, video provider)
      #   qt5compat            — QtCore5Compat (legacy helpers w kilku miejscach)
      #   qtserialport         — plugin DMX USB
      #   qtwebsockets         — art-net/streaming
      #   qtimageformats       — dodatkowe formaty ikon
      #   qt3d                 — uzywany przez engine fixtures 3D
      # UWAGA: rgbscriptv4.cpp uzywa QJSEngine z Qt::Qml (qtdeclarative),
      # ktory jest w glownej dystrybucji aqtinstall i nie wymaga osobnego modulu.
      # ----------------------------------------------------------------

      - name: Install Qt 6.8.1
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          dir: "${{ github.workspace }}/qt/"
          modules: 'qt5compat qt3d qtimageformats qtmultimedia qtserialport qtwebsockets'

      - name: Set QTDIR
        shell: bash
        run: |
          echo "QTDIR=${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/macos" >> $GITHUB_ENV
          echo "${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/macos/bin" >> $GITHUB_PATH

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-build-macos-v4-${{ matrix.arch }}-qt6

      - name: Print ENV vars
        shell: bash
        run: |
          echo "ARCH: ${{ matrix.arch }}"
          echo "RUNNER: ${{ matrix.runner }}"
          echo "CI_BRANCH: ${CI_BRANCH}"
          echo "APPVERSION: ${APPVERSION}"
          echo "BUILD_DATE: ${BUILD_DATE}"
          echo "GIT_REV: ${GIT_REV}"
          echo "QTDIR: ${QTDIR}"
          echo "NPROC: ${NPROC}"
          "${QTDIR}/bin/qmake" -query QT_VERSION QT_HOST_PREFIX

      - name: Configure build
        shell: bash
        run: |
          # CMAKE_OSX_DEPLOYMENT_TARGET=12.0 — matching oficjalnej dystrybucji
          # qlcplus.org ("macOS 12 or later"). Qt 6.8 wymaga min 12.0.
          # CMAKE_OSX_ARCHITECTURES wymusza natywna architekture — Qt jest uniwersalny,
          # ale nasz build chcemy miec single-arch (mniejszy DMG, szybsza kompilacja).
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QTDIR}/lib/cmake" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -Dqmlui=OFF

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . -j${NPROC}

      - name: Install
        shell: bash
        run: |
          cd build
          cmake --install . --strip || cmake --install .

      - name: Fix dylib dependencies and deploy Qt
        shell: bash
        run: |
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/Frameworks/libsndfile.1.dylib || true
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus-fixtureeditor || true
          "${QTDIR}/bin/macdeployqt" ~/QLC+.app

      # UWAGA: Swiadomie nie robimy ad-hoc codesign + hardened runtime entitlements.
      # Na macOS 12 (szczegolnie M1) taka kombinacja jest flaky i powoduje crash
      # przy starcie. Oficjalny upstream QLC+ tez nie podpisuje.
      # User pierwszy raz uruchamiajac apke musi zrobic prawy-klik -> Otworz
      # LUB: xattr -dr com.apple.quarantine /Applications/QLC+.app

      - name: Create DMG
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 12
          retry_wait_seconds: 1
          command: |
            OUTDIR=$PWD
            cd platforms/macos/dmg
            ./create-dmg --volname "Q Light Controller Plus ${APPVERSION}" \
              --volicon $OUTDIR/resources/icons/qlcplus.icns \
              --background background.png \
              --window-size 400 300 \
              --window-pos 200 100 \
              --icon-size 64 \
              --icon "QLC+" 0 150 \
              --app-drop-link 200 150 \
              "$OUTDIR/QLC+_${APPVERSION}_${{ matrix.arch }}.dmg" \
              ~/QLC+.app

      - name: Store DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLC+_${{ env.APPVERSION }}_${{ matrix.arch }}.dmg
          path: QLC+_${{ env.APPVERSION }}_${{ matrix.arch }}.dmg
          retention-days: 30
