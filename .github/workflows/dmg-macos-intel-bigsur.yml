name: DMG macOS Intel x86_64 Big Sur (Qt 5.15.2)

on:
  workflow_dispatch:

jobs:
  build-macos-intel-qt5:
    runs-on: macos-13
    name: Build QLC+ 4.14 macOS DMG (x86_64, Big Sur, Qt 5.15.2)

    env:
      CI_REPO_SLUG: ${{ github.repository }}
      CI_BRANCH: ${{ github.head_ref }}
      CI_PULL_REQUEST: ${{ github.event.number }}
      QT_VERSION: "5.15.2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set ENV variables
        shell: bash
        run: |
          echo "CI_BRANCH=$(echo $GITHUB_REF | cut -d '/' -f 3)" >> $GITHUB_ENV
          echo "APPVERSION=$(grep '^!qmlui' variables.pri | grep APPVERSION | sed 's/^.*= *//;s/ /_/g')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
          echo "GIT_REV=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "NPROC=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install fftw mad libsndfile libftdi libltc
          brew link --overwrite python@3.13 || true

      # Qt 5.15.2 via aqtinstall — base package zawiera Multimedia, MultimediaWidgets,
      # SerialPort, Network, Qml itp. Jedynym osobnym modulem jest QtScript (deprecated,
      # przeniesiony poza core w Qt 5.15).
      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          dir: "${{ github.workspace }}/qt/"
          modules: 'qtscript'

      - name: Set QTDIR
        shell: bash
        run: |
          echo "QTDIR=${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/clang_64" >> $GITHUB_ENV
          echo "${{ github.workspace }}/qt/Qt/${{ env.QT_VERSION }}/clang_64/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-macos-intel-qt5-x86_64-qt5

      - name: Print ENV vars
        shell: bash
        run: |
          echo "ARCH: x86_64"
          echo "RUNNER: macos-13"
          echo "CI_BRANCH: ${CI_BRANCH}"
          echo "APPVERSION: ${APPVERSION}"
          echo "BUILD_DATE: ${BUILD_DATE}"
          echo "GIT_REV: ${GIT_REV}"
          echo "QTDIR: ${QTDIR}"
          echo "NPROC: ${NPROC}"
          "${QTDIR}/bin/qmake" -query QT_VERSION QT_HOST_PREFIX

      - name: Configure build
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QTDIR}/lib/cmake" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -Dqmlui=OFF

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . -j${NPROC}

      - name: Install
        shell: bash
        run: |
          cd build
          cmake --install . --strip || cmake --install .

      - name: Fix dylib dependencies and deploy Qt
        shell: bash
        run: |
          find ~/QLC+.app \( -name '*.plist-e' -o -name '*.bak' \) -delete 2>/dev/null || true

          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/Frameworks/libsndfile.1.dylib || true
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus
          platforms/macos/fix_dylib_deps.sh ~/QLC+.app/Contents/MacOS/qlcplus-fixtureeditor || true

          chmod -R u+w ~/QLC+.app

          # Qt 5: macdeployqt nie zna flagi -codesign=- (to skladnia Qt 6)
          "${QTDIR}/bin/macdeployqt" ~/QLC+.app

          find ~/QLC+.app \( -name '*.plist-e' -o -name '*.bak' \) -delete 2>/dev/null || true

      - name: Ad-hoc codesign app bundle
        shell: bash
        run: |
          # BEZ --deep (deprecated), BEZ --options runtime (psuje na Intel Big Sur).
          # Uzytkownik przy pierwszym uruchomieniu: prawy-klik -> Otworz
          # lub: xattr -dr com.apple.quarantine /Applications/QLC+.app
          codesign --force --sign - --timestamp=none ~/QLC+.app
          echo "--- verify bundle signature ---"
          codesign --verify --verbose=2 ~/QLC+.app || true
          echo "--- spctl assessment (expected: rejected, source=Unsigned — OK dla ad-hoc) ---"
          spctl --assess --type execute --verbose ~/QLC+.app || true

      - name: Create DMG
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 12
          retry_wait_seconds: 1
          command: |
            OUTDIR=$PWD
            cd platforms/macos/dmg
            ./create-dmg --volname "Q Light Controller Plus ${APPVERSION}" \
              --volicon $OUTDIR/resources/icons/qlcplus.icns \
              --background background.png \
              --window-size 400 300 \
              --window-pos 200 100 \
              --icon-size 64 \
              --icon "QLC+" 0 150 \
              --app-drop-link 200 150 \
              "$OUTDIR/QLC+_${APPVERSION}_x86_64_bigsur.dmg" \
              ~/QLC+.app

      - name: Store DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QLC+_${{ env.APPVERSION }}_x86_64_bigsur.dmg
          path: QLC+_${{ env.APPVERSION }}_x86_64_bigsur.dmg
          retention-days: 30
